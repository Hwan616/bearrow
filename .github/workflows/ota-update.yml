name: OTA Update

# main 에 머지되면 네이티브 변경이 없는 JS/자산 수정을 production 채널로 즉시 배포.
# 네이티브 의존성이 바뀐 릴리즈는 release.yml(스토어 빌드)로 처리한다.
on:
  push:
    branches: [main]

jobs:
  update:
    name: EAS Update (production channel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        run: eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive
