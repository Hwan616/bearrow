name: Release (Fastlane Build + Submit)

# v* 태그 푸시 또는 수동 실행 시 프로덕션 빌드 후 스토어 제출(Fastlane).
# `production` 환경(repo Settings > Environments)에 수동 승인(required reviewers)을
# 설정해 릴리즈 게이트로 사용한다.
#
# 필요한 시크릿(repo Settings > Secrets):
#  - ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#  - PLAY_SERVICE_ACCOUNT_JSON  (Google Play 서비스 계정 키 JSON)
#  - APPLE 관련: APP_STORE_CONNECT_API_KEY 등 (iOS 빌드 시)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platform:
        description: "빌드 대상 플랫폼"
        type: choice
        options: [android, ios, all]
        default: android

jobs:
  # ---- Android: ubuntu 러너(무료) ----
  android:
    name: Android (Play 내부 트랙)
    if: ${{ github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    environment: production # 수동 승인 게이트
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (android)
        run: npx expo prebuild --platform android --no-install
      - name: Restore keystore & service account
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          [ -n "$ANDROID_KEYSTORE_BASE64" ] && echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore || echo "keystore 시크릿 없음 — 설정 필요"
          [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ] && echo "$PLAY_SERVICE_ACCOUNT_JSON" > play-service-account.json || echo "service account 없음 — 설정 필요"
      - name: Fastlane android beta
        run: bundle exec fastlane android beta

  # ---- iOS: macOS 러너 필요 (Apple Developer 계정 필수) ----
  ios:
    name: iOS (TestFlight)
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install dependencies
        run: npm ci
      - name: Prebuild (ios)
        run: npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Fastlane ios beta
        run: bundle exec fastlane ios beta
